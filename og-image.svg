<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="50%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#accent)"/>
  <polyline points="134,116 122,116 114,134 100,98 92,116 78,116"
    fill="none" stroke="white" stroke-width="5.5"
    stroke-linecap="round" stroke-linejoin="round"
    transform="translate(8,0)"/>

  <!-- Logo name -->
  <text x="174" y="130" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="36" fill="white" letter-spacing="-0.5">Apollo Wallet</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="72" fill="white" letter-spacing="-2">Seu patrimônio,</text>
  <text x="80" y="400" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800" font-size="72" fill="#06B6D4" letter-spacing="-2">sob controle total.</text>

  <!-- Subtitle -->
  <text x="80" y="470" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="400" font-size="28" fill="rgba(255,255,255,0.65)">
    Acompanhe investimentos de qualquer banco ou corretora em um só lugar.
  </text>

  <!-- Badge -->
  <rect x="80" y="520" width="200" height="40" rx="20"
    fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="180" y="545" font-family="'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="600" font-size="14" fill="white" text-anchor="middle" letter-spacing="1.5">100% GRATUITA</text>
</svg>
